apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  labels:
    app: user-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels: 
        app: user-service 
    spec:
      containers:
      - name: user-service
        image: acrmicroservicesplatform.azurecr.io/user-service:321a105f45274010af67273cb873c9ff178e11d9
        ports:
        - containerPort: 5000
        env:
        - name: PORT
          value: "5000"
          livenessProbe:
            httpGet:
            path: /health
            port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
            readinessProbe:
            httpGet:
            path: /health
            port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10